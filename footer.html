<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<footer class="border-top bg-white mt-5 py-5">
    <div class="container">
        <div class="row">

            <!-- Brand -->
            <div class="col-md-4 mb-4">
                <div class="d-flex align-items-center mb-3">
                    <span class="badge bg-primary fs-5 me-2">PC</span>
                    <h4 class="mb-0 fw-bold">BuildBench</h4>
                </div>
                <p class="text-muted">
                    Build your dream PC with confidence. Browse components,
                    compare prices, and create the perfect setup.
                </p>
            </div>

            <!-- Account -->
            <div class="col-md-4 mb-4">
                <h5 class="text-primary mb-3">Account</h5>

                <div class="d-grid gap-2">
                    <button class="btn btn-outline-primary">Login</button>
                    <button class="btn btn-outline-primary">Register</button>
                </div>
            </div>

            <!-- Company -->
            <div class="col-md-4 mb-4">
                <h5 class="text-primary mb-3">Company</h5>

                <div class="d-grid gap-2">
                    <button class="btn btn-outline-secondary">About Us</button>
                    <button class="btn btn-outline-secondary">Contact</button>
                    <button class="btn btn-outline-secondary">Privacy Policy</button>
                </div>
            </div>

        </div>

        <hr>

        <div class="text-center text-muted">
            © 2025 BuildBench. All Rights Reserved.
        </div>
    </div>
</footer>

</body>
</html>
